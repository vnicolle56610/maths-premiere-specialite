site_name: Maths Première spécialité
site_description: Cours, TD, méthodes et progression de Première spécialité mathématiques.
site_author: Vincent

nav:
  - Accueil: index.md
  - Progression: progression.md
  - Notions:
      - "N01 — Logique et intervalles": notions/N01-logique-intervalles.md
      - "N02 — Second degré : forme canonique": notions/N02-second-degre-forme-canonique.md
      - "N03 — Second degré : racines, signe, discriminant": notions/N03-second-degre-racines-signe-discriminant.md
      - "N04 — Second degré : inéquations et optimisation": notions/N04-second-degre-inequations-optimisation.md
  - Automatismes: automatismes/index.md
  - Corrigés publiés: corriges/index.md

theme:
  name: material
  language: fr
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.superfences
